body:after{
  content:""; position:fixed; inset:0; z-index:-2; pointer-events:none;
  background:radial-gradient(circle at 50% 10%, rgba(255,255,255,.08), transparent 26%),
             linear-gradient(180deg, transparent, rgba(0,0,0,.62));
}
.app{padding:54px 48px 34px; max-width:1200px}
.top{display:flex; justify-content:space-between; gap:30px; align-items:flex-start}
.brand{display:flex; align-items:center; gap:22px; margin-bottom:34px}
.logo{
  width:72px; height:72px; background:#fff; color:#07080b; display:grid; place-items:center;
  font-weight:900; font-size:26px; letter-spacing:-.06em;
  clip-path:polygon(0 0,100% 0,100% 74%,74% 100%,0 100%);
}
h1{margin:0; font-size:46px; line-height:1; letter-spacing:-.055em}
button,select,input{
  font:inherit;
}
button{
  border:1px solid var(--line); background:rgba(12,15,20,.48); color:var(--text);
  border-radius:10px; height:44px; padding:0 16px; cursor:pointer;
  backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
}
button:hover{background:rgba(255,255,255,.1)}
.actions{display:flex; gap:10px; margin-top:18px; flex-wrap:wrap}
.tabs{
  width:520px; height:70px; display:grid; grid-template-columns:1fr 1fr; border:1px solid var(--line);
  border-radius:12px; overflow:hidden; background:rgba(10,13,18,.5); margin-bottom:18px;
  backdrop-filter:blur(26px); -webkit-backdrop-filter:blur(26px);
}
.tab{height:100%; border:0; border-radius:0; background:transparent; color:var(--muted); font-size:18px}
.tab.active{background:var(--active); color:#fff; font-weight:800}
.card{
  display:none; max-width:760px; min-height:690px; padding:30px 24px;
  border:1px solid var(--line); border-radius:12px;
  background:linear-gradient(160deg, rgba(17,22,29,.76), rgba(7,9,13,.58));
  box-shadow:var(--shadow); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
}
.card.active{display:block}
h2{margin:0 0 20px; font-size:30px; letter-spacing:-.035em}
.sub{margin:-8px 0 20px; color:var(--muted)}
.addrow{display:grid; grid-template-columns:1fr 54px; height:58px; border:1px solid var(--line); border-radius:9px; overflow:hidden; margin-bottom:16px; background:rgba(0,0,0,.14)}
input[type=text], input[type=number]{
  min-width:0; width:100%; border:0; outline:none; color:var(--text); background:transparent; padding:0 16px;
}
.addrow button{border:0; border-left:1px solid var(--line2); border-radius:0; height:100%; font-size:32px; padding:0}
.toolbar{display:flex; gap:10px; flex-wrap:wrap; margin:0 0 16px}
.search{height:44px; border:1px solid var(--line); border-radius:10px; background:rgba(0,0,0,.18); max-width:260px}
.list{border:1px solid var(--line2); border-radius:9px; overflow:hidden}
.item{
  display:grid; grid-template-columns:34px 1fr 48px 144px 42px; align-items:center;
  min-height:62px; border-bottom:1px solid var(--line2); padding:8px 12px; background:rgba(0,0,0,.08);
}
.todo-item{grid-template-columns:34px 1fr 42px}
.item:last-child{border-bottom:0}
.item.dragging{opacity:.42}
.check{width:21px; height:21px; border:2px solid rgba(255,255,255,.65); border-radius:5px; display:grid; place-items:center; cursor:pointer}
.item.done .check:before{content:"✓"; font-weight:900; font-size:15px}
.item.done .txt{text-decoration:line-through; color:rgba(245,245,247,.43)}
.txt{font-size:17px; padding:0 10px; outline:none}
.qty{height:34px; width:48px!important; border:1px solid var(--line)!important; border-radius:8px!important; text-align:center; padding:0!important}
.handle{color:rgba(255,255,255,.65); text-align:center; font-size:23px; cursor:grab; user-select:none}
.delete-mode .handle{color:#ff7272; cursor:pointer}
.star{font-size:21px; cursor:pointer; color:rgba(255,255,255,.35); text-align:center}
.star.required{color:#ffd76b}
.cat{height:30px; border-radius:999px; border:1px solid rgba(255,255,255,.14); color:#fff; font-size:11px; font-weight:800; padding:0 10px; outline:none; cursor:pointer}
.cat.kamera{background:rgba(80,140,255,.42)} .cat.licht{background:rgba(255,190,70,.42)}
.cat.ton{background:rgba(80,220,150,.38)} .cat.bildtechnik{background:rgba(180,110,255,.40)}
.cat.grip{background:rgba(255,110,90,.38)} .cat.sonstiges{background:rgba(170,170,180,.28)}
.cat.verbrauch{background:rgba(255,130,40,.40)}
.sets{display:grid; gap:12px}
.set-card{min-height:94px; border:1px solid var(--line); border-radius:9px; display:grid; grid-template-columns:22px 1fr auto 32px; gap:16px; align-items:center; padding:0 20px; background:rgba(0,0,0,.12); cursor:pointer}
.ampel{width:14px; height:14px; border-radius:50%; background:#ff5f57; box-shadow:0 0 18px currentColor}
.ampel.red{background:#ff5f57} .ampel.yellow{background:#ffd15c} .ampel.green{background:#5cff88}
.set-title{font-weight:800; font-size:20px; margin-bottom:6px}
.set-desc{color:var(--muted); font-size:15px}
.set-count{color:rgba(245,245,247,.75)}
.arrow{font-size:31px; color:rgba(255,255,255,.7)}
.add-set{height:68px; width:100%; margin-top:16px; font-size:17px}
.detail{display:none} .detail.active{display:block}
.back{margin-bottom:18px}
.name-input{height:58px; border:1px solid var(--line)!important; border-radius:9px; margin-bottom:14px; background:rgba(0,0,0,.14)!important; font-size:22px!important; font-weight:800}
.cat-progress{display:grid; gap:8px; margin:0 0 16px}
.prow{display:grid; grid-template-columns:125px 1fr 52px; gap:10px; align-items:center; color:var(--muted); font-size:13px; font-weight:800}
.bar{height:8px; background:rgba(255,255,255,.1); border-radius:999px; overflow:hidden}
.fill{height:100%; background:rgba(255,255,255,.72); width:0%}
.small-actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:16px}
.progress{margin-top:24px; padding-top:20px; border-top:1px solid var(--line2); color:var(--muted); font-size:15px}
.file{display:none}
.footer{max-width:760px; margin-top:30px; text-align:center; color:rgba(245,245,247,.55); font-size:14px; line-height:1.8}
@media(max-width:900px){

<body>
<div class="app">
  <div class="top">
    <div>
      <div class="brand"><div class="logo">nano.</div><h1>nano. kameralager</h1></div>
      <div class="tabs">
        <button class="tab active" data-view="todo">☑︎ &nbsp; To Do</button>
        <button class="tab" data-view="equipment">▣ &nbsp; Equipment Checkliste</button>
      </div>
    </div>
    <div class="actions">
      <button id="saveBackup">☁︎ Backup speichern</button>
      <button id="loadBackup">☁︎ Backup laden</button>
      <input class="file" id="backupFile" type="file" accept="application/json">
    </div>
  </div>

  <section id="todoCard" class="card active">
    <h2>To Do</h2>
    <div class="addrow"><input id="todoInput" type="text" placeholder="Neue Aufgabe hinzufügen..."><button id="addTodo">+</button></div>
    <div id="todoList" class="list"></div>
    <div id="todoProgress" class="progress">0 von 0 erledigt</div>
    <div class="small-actions"><button id="deleteDoneTodos">Erledigte löschen</button><button id="deleteAllTodos">Alles löschen</button></div>
  </section>

  <section id="equipmentCard" class="card">
    <div id="setsOverview">
      <h2>Equipment Checkliste</h2>
      <div class="sub">Ampel: rot = leer, gelb = teilweise, grün = vollständig</div>
      <input id="globalSearch" class="search" type="text" placeholder="Suche über alle Sets...">
      <div id="sets" class="sets" style="margin-top:16px"></div>
      <button class="add-set" id="addSet">＋ Neues Set hinzufügen</button>
    </div>

    <div id="setDetail" class="detail">
      <button class="back" id="backToSets">← Zurück</button>
      <input id="setName" class="name-input" type="text">
      <div id="catProgress" class="cat-progress"></div>
      <div class="toolbar">
        <input id="setSearch" class="search" type="text" placeholder="Im Set suchen...">
        <button id="sortCats">Nach Kategorie sortieren</button>
      </div>
      <div class="addrow"><input id="equipInput" type="text" placeholder="Equipment hinzufügen..."><button id="addEquip">+</button></div>
      <div id="equipList" class="list"></div>
      <div id="equipProgress" class="progress">0 von 0 erledigt</div>
      <div class="small-actions">
        <button id="resetSet">Haken zurücksetzen</button>
        <button id="deleteSet">Set löschen</button>
      </div>
    </div>
  </section>

  <div id="cloudStatus" class="cloud-status sync">Cloud verbindet…</div>
  <div class="footer">⭐ = Pflichtteil · Zahl = Stückzahl · Kategorie-Farbe = Bereich · Ziehen am „=“ ändert Reihenfolge</div>
</div>

<script>
const KEY="nano-kameralager-icloud-html-v4";
const OLD_KEYS=["nano-kameralager-icloud-html-v3","nano-kameralager-icloud-html-v2","nano-kameralager-icloud-html-v1"];
const categories=["KAMERA","LICHT","TON","BILDTECHNIK","GRIP","VERBRAUCH","SONSTIGES"];
const catOrder=Object.fromEntries(categories.map((c,i)=>[c,i]));
const startData={todos:[],sets:[{name:"Set 1",items:[]},{name:"Set 2",items:[]},{name:"Set 3",items:[]},{name:"Set 4",items:[]}],selectedSet:null,view:"todo"};
window.data=load(); var data = window.data; let deleteMode=false, drag={type:null,index:null,setIndex:null};

function normalize(d){
  if(!d.todos)d.todos=[]; if(!d.sets)d.sets=structuredClone(startData.sets); if(!d.view)d.view="todo";
  d.sets.forEach(s=>{ if(!s.items)s.items=[]; s.items.forEach(i=>{ if(!i.cat)i.cat="SONSTIGES"; if(!i.qty)i.qty=1; if(i.required===undefined)i.required=false; }); });
  return d;
}
function load(){
  try{let d=JSON.parse(localStorage.getItem(KEY)); if(d)return normalize(d);
    for(const k of OLD_KEYS){d=JSON.parse(localStorage.getItem(k)); if(d)return normalize(d);}
  }catch(e){} return structuredClone(startData);
}
function save(){localStorage.setItem(KEY,JSON.stringify(data))}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function cls(c){return String(c||"SONSTIGES").toLowerCase()}

function setView(view){data.view=view;save();document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.view===view));todoCard.classList.toggle("active",view==="todo");equipmentCard.classList.toggle("active",view==="equipment")}

function makeCat(item){const s=document.createElement("select");s.className="cat "+cls(item.cat);categories.forEach(c=>{let o=document.createElement("option");o.value=c;o.textContent=c;if(item.cat===c)o.selected=true;s.appendChild(o)});s.onchange=()=>{item.cat=s.value;s.className="cat "+cls(item.cat);save();renderEquip();};return s}

function makeItem(item,onToggle,onDelete,opts){
  const row=document.createElement("div");
  row.className="item"+(opts.type==="todo"?" todo-item":"")+(item.done?" done":"")+(deleteMode?" delete-mode":"");
  row.draggable=true; row.dataset.index=opts.index;
  row.ondragstart=e=>{drag={type:opts.type,index:opts.index,setIndex:opts.setIndex};row.classList.add("dragging");e.dataTransfer.effectAllowed="move"};
  row.ondragend=()=>row.classList.remove("dragging");
  row.ondragover=e=>e.preventDefault();
  row.ondrop=e=>{e.preventDefault();moveItem(opts.type,drag.index,opts.index,opts.setIndex)};
  const check=document.createElement("div");check.className="check";check.onclick=onToggle;
  const txt=document.createElement("div");txt.className="txt";txt.textContent=item.text;txt.contentEditable=true;txt.oninput=()=>{item.text=txt.textContent.trim();save();};txt.ondragstart=e=>e.preventDefault();
  const handle=document.createElement("div");handle.className="handle";handle.textContent=deleteMode?"×":"=";handle.onclick=()=>{if(deleteMode)onDelete()};
  row.append(check,txt);
  if(opts.type!=="todo"){
    const qty=document.createElement("input");qty.type="number";qty.min="1";qty.className="qty";qty.value=item.qty||1;qty.oninput=()=>{item.qty=Number(qty.value)||1;save()};
    const star=document.createElement("div");star.className="star"+(item.required?" required":"");star.textContent="★";star.onclick=()=>{item.required=!item.required;save();renderEquip()};
    row.append(qty,makeCat(item),star);
  }
  row.append(handle); return row;
}

function moveItem(type,from,to,setIndex){if(from===null||from===to||type!==drag.type)return;let arr=type==="todo"?data.todos:data.sets[setIndex].items;let m=arr.splice(from,1)[0];arr.splice(to,0,m);save();type==="todo"?renderTodos():renderEquip()}

function renderTodos(){todoList.innerHTML="";data.todos.forEach((t,i)=>todoList.appendChild(makeItem(t,()=>{t.done=!t.done;save();renderTodos()},()=>{data.todos.splice(i,1);save();renderTodos()},{type:"todo",index:i})));let done=data.todos.filter(t=>t.done).length;todoProgress.textContent=`◉  ${done} von ${data.todos.length} erledigt`}

function setStatus(s){if(!s.items.length)return"red";let done=s.items.filter(i=>i.done).length;if(done===0)return"red";if(done===s.items.length)return"green";return"yellow"}
function renderSets(){sets.innerHTML="";let q=globalSearch.value.toLowerCase();data.sets.forEach((s,i)=>{let match=!q||s.name.toLowerCase().includes(q)||s.items.some(x=>x.text.toLowerCase().includes(q));if(!match)return;let done=s.items.filter(x=>x.done).length;let card=document.createElement("div");card.className="set-card";card.innerHTML=`<div class="ampel ${setStatus(s)}"></div><div><div class="set-title">${esc(s.name)}</div><div class="set-desc">${s.items.length} Posten · ${s.items.filter(x=>x.required).length} Pflichtteile</div></div><div class="set-count">${done} / ${s.items.length}</div><div class="arrow">›</div>`;card.onclick=()=>openSet(i);sets.appendChild(card)})}

function openSet(i){data.selectedSet=i;save();setsOverview.style.display="none";setDetail.classList.add("active");renderEquip()}
function closeSet(){data.selectedSet=null;save();setsOverview.style.display="block";setDetail.classList.remove("active");renderSets()}

function renderCatProgress(s){catProgress.innerHTML="";categories.forEach(c=>{let arr=s.items.filter(i=>i.cat===c);if(!arr.length)return;let done=arr.filter(i=>i.done).length;let pct=Math.round(done/arr.length*100);let r=document.createElement("div");r.className="prow";r.innerHTML=`<span>${c}</span><div class="bar"><div class="fill" style="width:${pct}%"></div></div><span>${done}/${arr.length}</span>`;catProgress.appendChild(r)})}
function renderEquip(){let s=data.sets[data.selectedSet];if(!s)return closeSet();setName.value=s.name;renderCatProgress(s);equipList.innerHTML="";let q=setSearch.value.toLowerCase();s.items.forEach((it,i)=>{if(!it.cat)it.cat="SONSTIGES";if(!it.qty)it.qty=1;if(q&&!it.text.toLowerCase().includes(q)&&!it.cat.toLowerCase().includes(q))return;equipList.appendChild(makeItem(it,()=>{it.done=!it.done;save();renderEquip()},()=>{s.items.splice(i,1);save();renderEquip()},{type:"equip",index:i,setIndex:data.selectedSet}))});let done=s.items.filter(x=>x.done).length;equipProgress.textContent=`◉  ${done} von ${s.items.length} erledigt · ⭐ ${s.items.filter(x=>x.required&&!x.done).length} Pflichtteile offen`}

function addTodoFn(){let v=todoInput.value.trim();if(!v)return;data.todos.unshift({text:v,done:false});todoInput.value="";save();renderTodos()}
function addEquipFn(){let s=data.sets[data.selectedSet],v=equipInput.value.trim();if(!v||!s)return;s.items.push({text:v,done:false,cat:"SONSTIGES",qty:1,required:false});equipInput.value="";save();renderEquip()}

addTodo.onclick=addTodoFn;todoInput.onkeydown=e=>{if(e.key==="Enter")addTodoFn()};
addEquip.onclick=addEquipFn;equipInput.onkeydown=e=>{if(e.key==="Enter")addEquipFn()};
deleteDoneTodos.onclick=()=>{data.todos=data.todos.filter(t=>!t.done);save();renderTodos()};
deleteAllTodos.onclick=()=>{if(confirm("Alle To-dos löschen?")){data.todos=[];save();renderTodos()}};
addSet.onclick=()=>{data.sets.push({name:"Neues Set",items:[]});save();renderSets()};
backToSets.onclick=closeSet;
setName.oninput=e=>{data.sets[data.selectedSet].name=e.target.value;save();renderSets()};
resetSet.onclick=()=>{data.sets[data.selectedSet].items.forEach(i=>i.done=false);save();renderEquip()};
deleteSet.onclick=()=>{if(confirm("Dieses Set löschen?")){data.sets.splice(data.selectedSet,1);save();closeSet()}};
sortCats.onclick=()=>{let s=data.sets[data.selectedSet];s.items.sort((a,b)=>(catOrder[a.cat]??99)-(catOrder[b.cat]??99)||a.text.localeCompare(b.text));save();renderEquip()};
globalSearch.oninput=renderSets; setSearch.oninput=renderEquip;
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>setView(b.dataset.view));

saveBackup.onclick=()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="nano-kameralager-backup.json";a.click();URL.revokeObjectURL(a.href)};
loadBackup.onclick=()=>backupFile.click();
backupFile.onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{data=normalize(JSON.parse(r.result));save();closeSet();renderTodos();renderSets();setView(data.view||"todo")}catch{alert("Backup konnte nicht geladen werden.")}};r.readAsText(file)};
document.addEventListener("keydown",e=>{if(e.key==="Backspace"&&(e.metaKey||e.ctrlKey)){deleteMode=!deleteMode;renderTodos();if(data.selectedSet!==null)renderEquip()}});



window.__setData = function(newData){
  data = newData;
  window.data = data;
};

window.normalize = normalize;
window.save = save;
window.setView = setView;
window.renderTodos = renderTodos;
window.renderSets = renderSets;
window.renderEquip = renderEquip;
window.closeSet = closeSet;

renderTodos();renderSets();setView(data.view||"todo");
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  onSnapshot,
  enableIndexedDbPersistence,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAndwuzOFPqT44cKIyKXltarJFcSeghHfg",
  authDomain: "nano-lager.firebaseapp.com",
  projectId: "nano-lager",
  storageBucket: "nano-lager.firebasestorage.app",
  messagingSenderId: "355793338705",
  appId: "1:355793338705:web:6613f9173803c6d3ddd370"
};

const CLOUD_COLLECTION = "packlists";
const CLOUD_DOCUMENT = "main";
const LOCAL_KEY = "nano-kameralager-icloud-html-v4";

const statusEl = document.getElementById("cloudStatus");
function setCloudStatus(text, cls="sync"){
  if(!statusEl) return;
  statusEl.textContent = text;
  statusEl.className = "cloud-status " + cls;
}

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, CLOUD_COLLECTION, CLOUD_DOCUMENT);

try {
  enableIndexedDbPersistence(db).catch(() => {});
} catch(e) {}

let cloudReady = false;
let applyingRemote = false;
let saveTimer = null;

function clone(obj){
  return JSON.parse(JSON.stringify(obj));
}

function localCurrentData(){
  try {
    if (window.data) return clone(window.data);
  } catch(e) {}
  try {
    return JSON.parse(localStorage.getItem(LOCAL_KEY));
  } catch(e) {
    return null;
  }
}

function applyRemoteData(remote){
  if(!remote || typeof remote !== "object") return;
  applyingRemote = true;

  try {
    if (typeof window.normalize === "function") {
      window.__setData(window.normalize(remote));
    } else {
      window.__setData(remote);
    }

    localStorage.setItem(LOCAL_KEY, JSON.stringify(window.data));

    if (typeof window.closeSet === "function" && window.data.selectedSet === null) {
      try { window.closeSet(); } catch(e) {}
    }
    if (typeof window.renderTodos === "function") window.renderTodos();
    if (typeof window.renderSets === "function") window.renderSets();
    if (window.data.selectedSet !== null && typeof window.renderEquip === "function") window.renderEquip();
    if (typeof window.setView === "function") window.setView(window.data.view || "todo");
  } finally {
    setTimeout(() => { applyingRemote = false; }, 100);
  }
}

async function initialCloudLoad(){
  setCloudStatus("Cloud lädt…", "sync");
  const snap = await getDoc(ref);
  const local = localCurrentData();

  if (snap.exists()) {
    const cloudData = snap.data().data;
    if (cloudData) applyRemoteData(cloudData);
    setCloudStatus("Cloud verbunden", "ok");
  } else {
    const initial = local || window.data;
    await setDoc(ref, {
      data: clone(initial),
      updatedAt: serverTimestamp()
    });
    setCloudStatus("Cloud angelegt", "ok");
  }

  cloudReady = true;
}

function pushCloudNow(){
  if(!cloudReady || applyingRemote) return;
  const current = localCurrentData();
  if(!current) return;

  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      setCloudStatus("Cloud speichert…", "sync");
      await setDoc(ref, {
        data: current,
        updatedAt: serverTimestamp()
      }, { merge: true });
      setCloudStatus("Cloud gespeichert", "ok");
    } catch(err) {
      console.error(err);
      setCloudStatus("Cloud Fehler", "err");
    }
  }, 250);
}

const originalSetItem = localStorage.setItem.bind(localStorage);
localStorage.setItem = function(key, value){
  originalSetItem(key, value);
  if(key === LOCAL_KEY) pushCloudNow();
};

initialCloudLoad().then(() => {
  onSnapshot(ref, (snap) => {
    if (!snap.exists()) return;
    const cloudData = snap.data().data;
    if (!cloudData) return;
    if (applyingRemote) return;
    applyRemoteData(cloudData);
    setCloudStatus("Cloud live", "ok");
  }, (err) => {
    console.error(err);
    setCloudStatus("Cloud Fehler", "err");
  });
}).catch((err) => {
  console.error(err);
  setCloudStatus("Cloud Fehler", "err");
});
</script>
